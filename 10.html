<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO_10</title>
    <style>
        body{
            background-color: beige;
        }
        h1{
            color: gray;  
        }
        h1 strong{
            color:blue;
        }
        p strong{
            color: red;
        }
    </style>
</head>
<body>
    <h1>Aprendiendo css con <strong>Daniel Cardenas</strong></h1>
    <p>
        Este otro recurso que provee las hojas de estilo en cascada (css) es la definición de un estilo para un elemento HTML siempre y cuando la misma esté contenida por otro elemento determinado. 
        Sólo en ese caso el estilo para dicha elemento se <strong>activará.</strong>
    </p>
</body>
</html>
