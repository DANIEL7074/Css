<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color:#0000FF;
            background-color: #808080 ;
            text-decoration: underline;
            text-align: center;
        }
        h2,h3{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: #36454F;
        }
        h1{
            font-size: 40px;
        }
        h2{
            font-size: 30px;
            text-align: left;
            text-decoration: double;
        }
        h3{
            font-size: 25px;
            text-align: center;
            text-decoration: underline;
        }
        p{
            text-indent: 20px;
        }
    </style>
</head>
<body>
    <h1 style="color:#0000FF;background-color: #808080 ;">
        Titulo 1 color azul sobre fondo gris</h1>
    <h1>T1</h1>
    <h2>¿Como usar css?</h2>
    <h3>Style</h3>
    <p>La propiedad text-indent, indenta la primera linea de un texto. A partir de la segunda línea, el texto aparece sin indentación. 
    Podemos indicar un valor negativo con lo que la indentación es hacia la izquierda.</p>
</body>
</html>
